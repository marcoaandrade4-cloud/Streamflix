<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADM</title>

<style>
body{background:#000;color:#fff;font-family:Arial;padding:10px}
input{display:block;margin:5px;padding:8px;width:100%}
button{padding:8px;margin:5px;background:#00ff66;border:none}
#painel{display:none}
.box{border:1px solid #333;margin:10px;padding:10px}
</style>
</head>

<body>

<h1>ADM</h1>

<div id="login">
<input id="user" placeholder="Usuário">
<input id="pass" type="password">
<button onclick="logar()">Entrar</button>
</div>

<div id="painel">

<input id="title" placeholder="Título">
<input id="cover" placeholder="Capa">

<button onclick="addSeason()">+ Temporada</button>
<div id="seasons"></div>

<button onclick="salvar()">Salvar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 projectId:"streamflix-62461"
});
const db = getFirestore(app);

let seasons=[];

window.logar=()=>{
 if(user.value==="marco" && pass.value==="22510827"){
  login.style.display="none";
  painel.style.display="block";
 }else alert("Login errado");
};

window.addSeason=()=>{
 seasons.push({episodes:[]});
 render();
};

window.addEpisode=(i)=>{
 seasons[i].episodes.push({
  title:"Episódio",
  languages:[{lang:"PT-BR",url:"",type:"youtube"}]
 });
 render();
};

function render(){
 seasonsDiv.innerHTML="";
 seasons.forEach((s,i)=>{
  let html=`<div class="box">
  <h3>Temporada ${i+1}</h3>
  <button onclick="addEpisode(${i})">+ Episódio</button>`;

  s.episodes.forEach((ep,j)=>{
   html+=`<input value="${ep.title}" 
   onchange="seasons[${i}].episodes[${j}].title=this.value">`;
  });

  html+=`</div>`;
  seasonsDiv.innerHTML+=html;
 });
}

window.salvar=async()=>{
 await addDoc(collection(db,"conteudos"),{
  type:"serie",
  title:title.value,
  cover:cover.value,
  seasons:seasons
 });

 alert("Salvo!");
};
</script>

</body>
</html>
