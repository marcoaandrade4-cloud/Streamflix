<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginBox">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="painel" style="display:none">

<h3>Criar Série</h3>
<input id="nomeSerie" placeholder="Nome">
<input id="capaSerie" placeholder="Capa URL">
<button onclick="criarSerie()">Criar</button>

<h3>Selecionar Série</h3>
<select id="listaSeries" onchange="carregarSerie()"></select>

<h3>Temporadas</h3>
<button onclick="addTemp()">+ Temporada</button>

<h3>Episódios</h3>
<input id="tituloEpADM" placeholder="Título">
<input id="tempNum" placeholder="Temporada (0,1,2)">
<input id="lang" placeholder="Idioma">
<input id="link" placeholder="Link">
<label><input type="checkbox" id="novoEp"> Novo episódio</label>
<button onclick="addEp()">Adicionar Episódio</button>

</div>

<script src="script.js"></script>
</body>
</html>
