<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginBox">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="painel" style="display:none">

<h2>Painel ADM</h2>

<!-- CRIAR -->
<input id="nomeSerie" placeholder="Nome">
<input id="capaSerie" placeholder="Capa">
<input id="sinopseSerie" placeholder="Sinopse">
<input id="anoSerie" placeholder="Ano">

<select id="tipo">
  <option value="serie">Série</option>
  <option value="filme">Filme</option>
</select>

<button onclick="criarSerie()">Criar</button>

<hr>

<select id="listaSeries" onchange="mostrarConteudo()"></select>

<button onclick="addTemp()">+ Temporada</button>

<div id="temps"></div>

<hr>

<h3>Novo Episódio / Filme</h3>

<input id="tituloEpADM" placeholder="Título">
<input id="tempNum" placeholder="Temporada (0,1)">
<input id="capaEpADM" placeholder="Capa episódio">
<input id="lang" placeholder="Idioma">
<input id="link" placeholder="Link">

<button onclick="addIdioma()">+ Idioma</button>

<label><input type="checkbox" id="novoEp"> Novo episódio</label>

<button onclick="addEp()">Salvar Episódio</button>

</div>

<script src="script.js"></script>
</body>
</html>
