<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#111;color:white;text-align:center;}
input,textarea,select{display:block;margin:10px auto;padding:10px;width:250px;}
button{padding:10px;background:red;color:white;border:none;margin:5px;}
#panel{display:none;}
#login{display:none;}
.item{border:1px solid #333;margin:10px;padding:10px;}
</style>
</head>

<body>

<h1>ADMIN</h1>

<button onclick="mostrarLogin()">Entrar ADM</button>

<div id="login">
<input id="user" placeholder="Usuário">
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="panel">

<h2>Adicionar</h2>

<select id="tipo">
<option value="filme">Filme</option>
<option value="serie">Série</option>
</select>

<input id="title" placeholder="Título">
<input id="cover" placeholder="Capa">
<input id="year" placeholder="Ano">
<textarea id="desc" placeholder="Sinopse"></textarea>

<input id="lang" placeholder="Idioma">
<input id="url" placeholder="Link">
<select id="vtype">
<option value="youtube">YouTube</option>
<option value="mp4">MP4</option>
<option value="drive">Drive</option>
</select>

<button onclick="salvar()">Salvar</button>

<hr>

<h2>Conteúdos</h2>
<div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 authDomain:"streamflix-62461.firebaseapp.com",
 projectId:"streamflix-62461"
});

const db = getFirestore(app);

let editId = null;

// 🔐 LOGIN
window.mostrarLogin = () => {
 document.getElementById("login").style.display = "block";
};

window.login = () => {
 const u = user.value;
 const p = pass.value;

 if(u==="marco" && p==="22510827"){
  panel.style.display="block";
  login.style.display="none";
  carregar();
 } else {
  alert("Login errado");
 }
};

// 💾 SALVAR / EDITAR
window.salvar = async () => {

 const data = {
  type:tipo.value,
  title:title.value,
  cover:cover.value,
  year:year.value,
  description:desc.value,
  languages:[{
    lang:lang.value,
    url:url.value,
    type:vtype.value
  }],
  seasons:[]
 };

 if(editId){
  await updateDoc(doc(db,"conteudos",editId), data);
  editId = null;
  alert("Atualizado!");
 } else {
  await addDoc(collection(db,"conteudos"), data);
  alert("Salvo!");
 }

 limpar();
 carregar();
};

// 📄 LISTAR
async function carregar(){
 const div = document.getElementById("lista");
 div.innerHTML="";

 const snap = await getDocs(collection(db,"conteudos"));

 snap.forEach(d=>{
  const c = d.data();

  div.innerHTML += `
    <div class="item">
      <h3>${c.title}</h3>
      <p>${c.year}</p>

      <button onclick="editar('${d.id}')">Editar</button>
      <button onclick="deletar('${d.id}')">Excluir</button>
    </div>
  `;
 });
}

// ✏️ EDITAR
window.editar = async (id)=>{
 const snap = await getDocs(collection(db,"conteudos"));

 snap.forEach(d=>{
  if(d.id === id){
    const c = d.data();

    title.value = c.title;
    cover.value = c.cover;
    year.value = c.year;
    desc.value = c.description;

    if(c.languages && c.languages.length){
      lang.value = c.languages[0].lang;
      url.value = c.languages[0].url;
      vtype.value = c.languages[0].type;
    }

    tipo.value = c.type;
    editId = id;
  }
 });
};

// ❌ DELETAR
window.deletar = async (id)=>{
 await deleteDoc(doc(db,"conteudos",id));
 alert("Excluído!");
 carregar();
};

// 🧹 LIMPAR
function limpar(){
 title.value="";
 cover.value="";
 year.value="";
 desc.value="";
 lang.value="";
 url.value="";
}
</script>

</body>
</html>
