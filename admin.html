<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#111;color:white;text-align:center;}
input,textarea,select{display:block;margin:10px auto;padding:10px;width:250px;}
button{padding:10px;background:red;color:white;border:none;}
#panel{display:none;}
</style>
</head>

<body>

<h1>ADMIN</h1>

<button onclick="mostrarLogin()">Entrar ADM</button>

<div id="login" style="display:none;">
<input id="user" placeholder="user">
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="panel">

<select id="tipo">
<option value="filme">Filme</option>
<option value="serie">Série</option>
</select>

<input id="title" placeholder="Título">
<input id="cover" placeholder="Capa">
<input id="year" placeholder="Ano">
<textarea id="desc" placeholder="Sinopse"></textarea>

<h3>Idioma</h3>
<input id="lang" placeholder="Idioma (ex: PT-BR)">
<input id="url" placeholder="Link">
<select id="vtype">
<option value="youtube">YouTube</option>
<option value="mp4">MP4</option>
<option value="drive">Drive</option>
</select>

<button onclick="salvar()">Salvar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOK...",
 authDomain:"streamflix-62461.firebaseapp.com",
 projectId:"streamflix-62461"
});

const db = getFirestore(app);

window.mostrarLogin=()=>{document.getElementById("login").style.display="block";}

window.login=()=>{
 if(user.value==="marco" && pass.value==="22510827"){
  panel.style.display="block";
  login.style.display="none";
 }
}

window.salvar=async()=>{
 await addDoc(collection(db,"conteudos"),{
  type:tipo.value,
  title:title.value,
  cover:cover.value,
  year:year.value,
  description:desc.value,
  languages:[{
    lang:lang.value,
    url:url.value,
    type:vtype.value
  }],
  seasons:[]
 });

 alert("Salvo!");
}
</script>

</body>
</html>
