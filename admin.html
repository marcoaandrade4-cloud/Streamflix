<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login ADM</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>Criar</h3>
<input id="nome" placeholder="Nome">
<input id="img" placeholder="Imagem">
<input id="ano" placeholder="Ano">
<input id="sinopse" placeholder="Sinopse">
<input id="categoria" placeholder="Categoria">

<select id="tipo">
<option value="serie">Série</option>
<option value="filme">Filme</option>
</select>

<button onclick="criar()">Criar</button>

<hr>

<select id="lista"></select>
<button onclick="addTemp()">+ Temporada</button>

<h3>Episódio</h3>
<input id="epTitulo">
<input id="temp">
<input id="lang">
<input id="link">

<button onclick="addIdioma()">+ idioma</button>

<label><input type="checkbox" id="novo"> Novo episódio</label>

<button onclick="salvarEp()">Salvar</button>

</div>

<script src="script.js"></script>
</body>
</html>
