<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{background:#111;color:white;text-align:center;}
input,textarea,select{display:block;margin:10px auto;padding:10px;width:250px;}
button{padding:10px;background:red;color:white;border:none;}
#panel{display:none;}
#login{display:none;}
</style>
</head>

<body>

<h1>ADMIN</h1>

<button onclick="mostrarLogin()">Entrar ADM</button>

<div id="login">
<input id="user" placeholder="Usuário">
<input id="pass" type="password">
<button onclick="login()">Login</button>
</div>

<div id="panel">

<select id="tipo">
<option value="filme">Filme</option>
<option value="serie">Série</option>
</select>

<input id="title" placeholder="Título">
<input id="cover" placeholder="Capa">
<input id="year" placeholder="Ano">
<textarea id="desc" placeholder="Sinopse"></textarea>

<h3>Idioma</h3>
<input id="lang" placeholder="Idioma">
<input id="url" placeholder="Link">
<select id="vtype">
<option value="youtube">YouTube</option>
<option value="mp4">MP4</option>
<option value="drive">Drive</option>
</select>

<button onclick="salvar()">Salvar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 authDomain:"streamflix-62461.firebaseapp.com",
 projectId:"streamflix-62461"
});

const db = getFirestore(app);

window.mostrarLogin = () => {
 document.getElementById("login").style.display = "block";
};

window.login = () => {
 const u = document.getElementById("user").value;
 const p = document.getElementById("pass").value;

 if(u==="marco" && p==="22510827"){
  document.getElementById("panel").style.display="block";
  document.getElementById("login").style.display="none";
 } else {
  alert("Login errado");
 }
};

window.salvar = async () => {
 await addDoc(collection(db,"conteudos"),{
  type:document.getElementById("tipo").value,
  title:document.getElementById("title").value,
  cover:document.getElementById("cover").value,
  year:document.getElementById("year").value,
  description:document.getElementById("desc").value,
  languages:[{
    lang:document.getElementById("lang").value,
    url:document.getElementById("url").value,
    type:document.getElementById("vtype").value
  }],
  seasons:[]
 });

 alert("Salvo!");
};
</script>

</body>
</html>
