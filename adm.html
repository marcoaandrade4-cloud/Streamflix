<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login ADM</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">

<h3>Criar Conteúdo</h3>
<input id="nome" placeholder="Nome">
<input id="img" placeholder="Imagem">
<input id="categoria" placeholder="Categoria">

<select id="tipo">
<option value="serie">Série</option>
<option value="filme">Filme</option>
</select>

<button onclick="criar()">Criar</button>

<hr>

<h3>Selecionar Série</h3>

<select id="lista"></select>
<button onclick="selecionarSerie()">Selecionar</button>

<hr>

<h3>Temporadas</h3>
<button onclick="addTemp()">+ Temporada</button>
<div id="areaTemp"></div>

<hr>

<h3>Episódios</h3>

<input id="tituloEp" placeholder="Título">
<input id="temp" placeholder="Temporada (0)">
<input id="idioma" placeholder="Idioma">
<input id="link" placeholder="Link">

<button onclick="addIdioma()">+ idioma</button>

<label><input type="checkbox" id="novo"> Novo episódio</label>

<button onclick="salvarEp()">Salvar Episódio</button>

<div id="areaEps"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="adm.js"></script>

</body>
</html>
