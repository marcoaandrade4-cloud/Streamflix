<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="titulo"></h2>

<h3>Escolher idioma</h3>
<div id="idiomas"></div>

<div id="player"></div>

<script>
let ep = JSON.parse(localStorage.getItem("ep"));

if(!ep){
  document.body.innerHTML = "<h2>Erro ao carregar episódio</h2>";
}else{

  titulo.innerText = ep.titulo || "Episódio";

  let idiomasDiv = document.getElementById("idiomas");
  let playerDiv = document.getElementById("player");

  function getYoutubeId(url){
    if(url.includes("youtu.be")){
      return url.split("/").pop();
    }
    if(url.includes("v=")){
      return url.split("v=")[1].split("&")[0];
    }
    return null;
  }

  function criarPlayer(link){

    playerDiv.innerHTML = "";

    // YOUTUBE
    if(link.includes("youtube")){
      let id = getYoutubeId(link);

      playerDiv.innerHTML = `
        <iframe 
        width="100%" 
        height="250" 
        src="https://www.youtube.com/embed/${id}" 
        frameborder="0" 
        allowfullscreen>
        </iframe>
      `;
    }

    // DRIVE
    else if(link.includes("drive.google.com")){
      let id = link.split("/d/")[1]?.split("/")[0];

      playerDiv.innerHTML = `
        <iframe 
        src="https://drive.google.com/file/d/${id}/preview" 
        width="100%" 
        height="250" 
        allow="autoplay">
        </iframe>
      `;
    }

    // VIDEO NORMAL
    else{
      playerDiv.innerHTML = `
        <video controls width="100%">
          <source src="${link}">
        </video>
      `;
    }
  }

  // BOTÕES DE IDIOMA
  for(let lang in ep.links){

    let btn = document.createElement("button");
    btn.innerText = lang;

    btn.onclick = ()=>{
      criarPlayer(ep.links[lang]);
    };

    idiomasDiv.appendChild(btn);
  }

}
</script>

</body>
</html>
