<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎬 Player</h1>
</header>

<main>
  <h2 id="titulo"></h2>

  <iframe id="video" width="100%" height="250" allowfullscreen></iframe>

  <br><br>
  <button onclick="voltar()">⬅ Voltar</button>
</main>

<script>
const url = new URLSearchParams(window.location.search);
document.getElementById("titulo").innerText = url.get("nome");
document.getElementById("video").src = url.get("video");

function voltar(){
  history.back();
}
</script>

</body>
</html>
