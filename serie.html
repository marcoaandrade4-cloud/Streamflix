<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Série</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}

/* HEADER */
.header{
 padding:15px;
 background:#0b0b0b;
 border-bottom:2px solid #00ff66;
 text-align:center;
}

/* LISTA HORIZONTAL */
.list{
 display:flex;
 overflow-x:auto;
 gap:10px;
 padding:10px;
}
.item{
 background:#111;
 padding:10px 15px;
 border-radius:10px;
 cursor:pointer;
}
.item:hover{
 background:#00ff66;
 color:#000;
}

/* PLAYER */
.player{
 text-align:center;
 margin:15px;
}
</style>
</head>

<body>

<div class="header">
 <h2 id="title"></h2>
</div>

<h3>Temporadas</h3>
<div class="list" id="temporadas"></div>

<h3>Episódios</h3>
<div class="list" id="episodios"></div>

<h3>Idiomas</h3>
<div class="list" id="idiomas"></div>

<div class="player" id="player"></div>

<script>
const data = JSON.parse(localStorage.getItem("serie"));
title.innerText = data.title;

let temporadaAtual, episodioAtual;

data.seasons.forEach((s,i)=>{
 const el=document.createElement("div");
 el.className="item";
 el.innerText="T"+(i+1);

 el.onclick=()=>{
  temporadaAtual=s;
  mostrarEp();
 };

 temporadas.appendChild(el);
});

function mostrarEp(){
 episodios.innerHTML="";
 idiomas.innerHTML="";
 player.innerHTML="";

 temporadaAtual.episodes.forEach(ep=>{
  const el=document.createElement("div");
  el.className="item";
  el.innerText=ep.title;

  el.onclick=()=>{
   episodioAtual=ep;
   mostrarLang();
  };

  episodios.appendChild(el);
 });
}

function mostrarLang(){
 idiomas.innerHTML="";
 player.innerHTML="";

 episodioAtual.languages.forEach(l=>{
  const el=document.createElement("div");
  el.className="item";
  el.innerText=l.lang;

  el.onclick=()=>{
   player.innerHTML=`
   <iframe width="90%" height="400"
   src="https://www.youtube.com/embed/${l.url}"
   allowfullscreen></iframe>`;
  };

  idiomas.appendChild(el);
 });
}
</script>

</body>
</html>
