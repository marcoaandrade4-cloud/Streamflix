<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Série</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="titulo"></h2>

<h3>Temporadas</h3>
<div id="temporadas"></div>

<h3>Episódios</h3>
<div id="episodios"></div>

<script>
let serie = JSON.parse(localStorage.getItem("serie"));

if(!serie){
  document.body.innerHTML = "<h2>Erro ao carregar série</h2>";
}else{

  document.getElementById("titulo").innerText = serie.nome;

  let temporadasDiv = document.getElementById("temporadas");
  let episodiosDiv = document.getElementById("episodios");

  let temporadas = serie.temporadas || [];

  temporadasDiv.innerHTML = "";

  temporadas.forEach((temp,i)=>{

    if(!temp.episodios) temp.episodios = [];

    let btn = document.createElement("button");
    btn.innerText = "Temporada " + (i+1);

    btn.onclick = ()=>{

      episodiosDiv.innerHTML = "";

      let eps = temp.episodios;

      if(eps.length === 0){
        episodiosDiv.innerHTML = "<p>Sem episódios</p>";
        return;
      }

      eps.forEach((ep,index)=>{

        let epBtn = document.createElement("button");
        epBtn.innerText = ep.titulo || ("Ep " + (index+1));

        epBtn.onclick = ()=>{
          localStorage.setItem("ep", JSON.stringify(ep));
          location.href = "player.html";
        };

        episodiosDiv.appendChild(epBtn);
      });
    };

    temporadasDiv.appendChild(btn);

  });

}
</script>

</body>
</html>
