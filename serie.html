<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Série</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}

/* HEADER */
.header{
 padding:15px;
 text-align:center;
 background:#0b0b0b;
 border-bottom:2px solid #00ff66;
}

/* LISTAS */
.list{
 display:flex;
 overflow-x:auto;
 padding:10px;
 gap:10px;
}

.item{
 background:#111;
 padding:10px 15px;
 border-radius:10px;
 white-space:nowrap;
 cursor:pointer;
}

.item.active{
 background:#00ff66;
 color:#000;
 font-weight:bold;
}

/* PLAYER */
.player{
 margin:15px;
 text-align:center;
}
</style>
</head>

<body>

<div class="header">
 <h2 id="title"></h2>
</div>

<h3 style="padding-left:10px">Temporadas</h3>
<div class="list" id="temporadas"></div>

<h3 style="padding-left:10px">Episódios</h3>
<div class="list" id="episodios"></div>

<h3 style="padding-left:10px">Idiomas</h3>
<div class="list" id="idiomas"></div>

<div class="player" id="player"></div>

<script>
const data = JSON.parse(localStorage.getItem("serie"));
title.innerText = data.title;

let temporadaAtual=null;
let episodioAtual=null;

data.seasons.forEach((s,i)=>{
 const div=document.createElement("div");
 div.className="item";
 div.innerText="T"+(i+1);

 div.onclick=()=>{
  temporadaAtual=s;
  atualizarEpisodios();
 };

 temporadas.appendChild(div);
});

function atualizarEpisodios(){
 episodios.innerHTML="";
 idiomas.innerHTML="";
 player.innerHTML="";

 temporadaAtual.episodes.forEach(ep=>{
  const div=document.createElement("div");
  div.className="item";
  div.innerText=ep.title;

  div.onclick=()=>{
   episodioAtual=ep;
   atualizarIdiomas();
  };

  episodios.appendChild(div);
 });
}

function atualizarIdiomas(){
 idiomas.innerHTML="";
 player.innerHTML="";

 episodioAtual.languages.forEach(l=>{
  const div=document.createElement("div");
  div.className="item";
  div.innerText=l.lang;

  div.onclick=()=>{
   player.innerHTML=`
   <iframe width="90%" height="400"
   src="https://www.youtube.com/embed/${l.url}"
   allowfullscreen></iframe>`;
  };

  idiomas.appendChild(div);
 });
}
</script>

</body>
</html>
