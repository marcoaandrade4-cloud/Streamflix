<script>
let serie = JSON.parse(localStorage.getItem("serie"));

if(!serie){
  document.body.innerHTML = "<h2>Erro</h2>";
}else{

  titulo.innerText = serie.nome;

  let temporadas = serie.temporadas || [];

  temporadas.forEach((temp,i)=>{
    let btn = document.createElement("button");
    btn.innerText = "Temporada " + (i+1);

    btn.onclick = ()=>{
      episodios.innerHTML="";

      let eps = temp.episodios || [];

      if(eps.length === 0){
        episodios.innerHTML = "<p>Sem episódios</p>";
        return;
      }

      eps.forEach(ep=>{
        let b = document.createElement("button");
        b.innerText = ep.titulo;

        b.onclick = ()=>{
          localStorage.setItem("ep", JSON.stringify(ep));
          location.href="player.html";
        };

        episodios.appendChild(b);
      });
    };

    temporadas.appendChild(btn);
  });

}
</script>
