<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Série</title>

<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center}
button{
 display:block;margin:10px auto;
 padding:10px;width:200px;
 background:#111;color:#fff;border:1px solid #333;
}
h2{margin-top:20px}
</style>
</head>

<body>

<h1 id="title"></h1>

<div id="temporadas"></div>
<div id="episodios"></div>
<div id="idiomas"></div>
<div id="player"></div>

<script>
const data = JSON.parse(localStorage.getItem("serie"));

title.innerText = data.title;

function limpar(){
 episodios.innerHTML="";
 idiomas.innerHTML="";
 player.innerHTML="";
}

temporadas.innerHTML="<h2>Temporadas</h2>";

data.seasons.forEach((s,i)=>{
 const btn=document.createElement("button");
 btn.innerText="Temporada "+(i+1);

 btn.onclick=()=>{
   limpar();
   mostrarEp(s);
 };

 temporadas.appendChild(btn);
});

function mostrarEp(season){
 episodios.innerHTML="<h2>Episódios</h2>";

 season.episodes.forEach(ep=>{
  const btn=document.createElement("button");
  btn.innerText=ep.title;

  btn.onclick=()=>{
    idiomas.innerHTML="";
    player.innerHTML="";
    mostrarIdiomas(ep.languages);
  };

  episodios.appendChild(btn);
 });
}

function mostrarIdiomas(langs){
 idiomas.innerHTML="<h2>Idiomas</h2>";

 langs.forEach(l=>{
  const btn=document.createElement("button");
  btn.innerText=l.lang;

  btn.onclick=()=>{
    player.innerHTML="";
    assistir(l.url,l.type);
  };

  idiomas.appendChild(btn);
 });
}

function assistir(url,type){
 if(type==="youtube"){
  player.innerHTML=`<iframe width="90%" height="400"
  src="https://www.youtube.com/embed/${url}"
  allowfullscreen></iframe>`;
 }
}
</script>

</body>
</html>
