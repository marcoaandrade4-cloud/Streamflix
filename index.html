<script>
const senhaADM = "1234"; // MUDE ISSO

let db = JSON.parse(localStorage.getItem("db")) || {
  series: []
};

let serieAtual = null;

/* -------- RENDER -------- */
function render() {
  const grid = document.querySelector(".grid") || document.getElementById("grid");
  if (!grid) return;

  grid.innerHTML = "";

  db.series.forEach((s, i) => {
    grid.innerHTML += `
      <div class="card" onclick="abrirSerie(${i})">
        <img src="${s.thumb}" onerror="this.src='https://via.placeholder.com/300x400?text=SEM+IMAGEM'">
        <p>${s.nome}</p>
      </div>
    `;
  });
}

/* -------- ABRIR SÉRIE -------- */
function abrirSerie(i) {
  serieAtual = i;
  const s = db.series[i];

  document.body.innerHTML = `
    <button onclick="location.reload()">⬅ Voltar</button>
    <h2>${s.nome}</h2>

    ${s.eps.map((ep, i) => `
      <div class="card">
        <h3>${ep.nome}</h3>
        <button onclick="abrirPlayer(${i})">Assistir</button>
        <button onclick="removerEp(${i})">❌</button>
      </div>
    `).join("")}
  `;
}

/* -------- PLAYER -------- */
function abrirPlayer(i) {
  const ep = db.series[serieAtual].eps[i];

  document.body.innerHTML = `
    <button onclick="location.reload()">⬅ Voltar</button>
    <h2>${ep.nome}</h2>

    <div id="idiomas"></div>

    <video id="video" controls autoplay></video>
  `;

  const idiomasDiv = document.getElementById("idiomas");

  ep.idiomas.forEach(i => {
    idiomasDiv.innerHTML += `
      <button onclick="trocar('${i.link}')">${i.nome}</button>
    `;
  });

  trocar(ep.idiomas[0].link);
}

function trocar(link) {
  document.getElementById("video").src = link;
}

/* -------- ADM -------- */
function abrirADM() {
  const senha = prompt("Senha ADM:");
  if (senha !== senhaADM) return alert("Errado");

  document.body.innerHTML = `
    <h2>Modo ADM</h2>

    <h3>Nova Série</h3>
    <input id="nomeSerie" placeholder="Nome">
    <input id="thumbSerie" placeholder="Imagem URL">
    <button onclick="criarSerie()">Criar</button>

    <hr>

    <h3>Adicionar Episódio</h3>
    <select id="serieSelect"></select>
    <input id="nomeEp" placeholder="Nome do episódio">

    <h4>Idiomas</h4>
    <input id="idiomaNome" placeholder="BR">
    <input id="idiomaLink" placeholder="link">
    <button onclick="addIdioma()">+</button>

    <ul id="listaIdiomas"></ul>

    <button onclick="salvarEp()">Salvar Episódio</button>

    <br><br>
    <button onclick="location.reload()">Voltar</button>
  `;

  atualizarSelect();
}

let idiomasTemp = [];

function addIdioma() {
  const nome = document.getElementById("idiomaNome").value;
  const link = document.getElementById("idiomaLink").value;

  idiomasTemp.push({ nome, link });

  document.getElementById("listaIdiomas").innerHTML += `<li>${nome}</li>`;
}

function criarSerie() {
  const nome = document.getElementById("nomeSerie").value;
  const thumb = document.getElementById("thumbSerie").value;

  db.series.push({
    nome,
    thumb,
    eps: []
  });

  salvar();
  alert("Criado!");
}

function salvarEp() {
  const i = document.getElementById("serieSelect").value;
  const nome = document.getElementById("nomeEp").value;

  db.series[i].eps.push({
    nome,
    idiomas: idiomasTemp
  });

  idiomasTemp = [];
  salvar();
  alert("Episódio salvo!");
}

function removerEp(i) {
  db.series[serieAtual].eps.splice(i, 1);
  salvar();
  location.reload();
}

function atualizarSelect() {
  const sel = document.getElementById("serieSelect");
  if (!sel) return;

  sel.innerHTML = "";
  db.series.forEach((s, i) => {
    sel.innerHTML += `<option value="${i}">${s.nome}</option>`;
  });
}

function salvar() {
  localStorage.setItem("db", JSON.stringify(db));
}

/* -------- BOTÃO ADM -------- */
const btn = document.createElement("button");
btn.innerText = "ADM";
btn.style.position = "fixed";
btn.style.bottom = "10px";
btn.style.right = "10px";
btn.onclick = abrirADM;
document.body.appendChild(btn);

/* -------- START -------- */
render();
</script>
