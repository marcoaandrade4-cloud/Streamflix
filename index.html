<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StreamFlix</title>

<style>
body{background:#0b0f0b;color:white;font-family:Arial;margin:0;}
.header{display:flex;justify-content:space-between;padding:10px;background:#111;}
.logo{color:#00ff66;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:10px;}
.card{background:#111;border-radius:10px;overflow:hidden;cursor:pointer;}
.card img{width:100%;}
.card p{text-align:center;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🐾 StreamFlix</div>
  <button onclick="location='admin.html'">ADM</button>
</div>

<h2 style="padding:10px;">Séries</h2>
<div id="catalogo" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 projectId:"streamflix-62461"
});

const db = getFirestore(app);

async function carregar(){
 const snap = await getDocs(collection(db,"conteudos"));

 snap.forEach(doc=>{
  const c = doc.data();

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${c.cover}">
    <p>${c.title}</p>
  `;

  div.onclick=()=>{
    localStorage.setItem("serie",JSON.stringify(c));
    location="serie.html";
  };

  catalogo.appendChild(div);
 });
}

carregar();
</script>

</body>
</html>
