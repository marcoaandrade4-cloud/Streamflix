<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chat Noir Brasil</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* HEADER */
header {
  background:#0b0b0b;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo {
  font-size:20px;
  color:#00ff00;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:10px;
}

.menu button {
  background:#111;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

/* NOVO EP */
.novo {
  background:#111;
  margin:15px;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.novo button {
  background:#00ff00;
  border:none;
  padding:10px 20px;
  border-radius:10px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card img {
  width:100%;
  border-radius:15px;
}

.card h3 {
  text-align:center;
}

/* EP LISTA */
.ep {
  display:flex;
  background:#111;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
}

.ep img {
  width:120px;
}

.ep div {
  padding:10px;
}

/* PLAYER */
.player iframe {
  width:100%;
  height:250px;
  border:none;
}

/* ADM */
input {
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Chat Noir Brasil</div>
  <div class="menu">
    <button onclick="home()">🏠</button>
    <button onclick="temporadas()">📺</button>
    <button onclick="abrirADM()">➕</button>
  </div>
</header>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc,
  query, orderBy, where, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* HOME */
window.home = async () => {
  const snap = await getDocs(collection(db,"series"));

  let html = `
    <div class="novo" id="novoEp"></div>
    <h2 style="text-align:center;">Bem-vindo ao Chat Noir Brasil!</h2>
    <div class="grid">
  `;

  snap.forEach(doc=>{
    const s = doc.data();

    html += `
      <div class="card" onclick="abrirSerie('${doc.id}')">
        <img src="${s.capa}">
        <h3>${s.nome}</h3>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("app").innerHTML = html;

  carregarNovo();
};

/* NOVO EP */
async function carregarNovo() {
  const q = query(collection(db,"episodios"), orderBy("ordem","desc"));
  const snap = await getDocs(q);

  if (snap.empty) return;

  const ep = snap.docs[0];

  document.getElementById("novoEp").innerHTML = `
    <h3>Novo episódio!</h3>
    <p>${ep.data().nome}</p>
    <button onclick="abrirEp('${ep.id}')">Assistir</button>
  `;
}

/* TEMPORADAS */
window.temporadas = async () => {
  const snap = await getDocs(collection(db,"series"));

  let html = `<h2 style="text-align:center;">Temporadas</h2>`;

  snap.forEach(doc=>{
    const s = doc.data();

    html += `
      <div class="ep" onclick="abrirSerie('${doc.id}')">
        <img src="${s.capa}">
        <div>
          <h3>${s.nome}</h3>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
};

/* EPISÓDIOS */
window.abrirSerie = async (id) => {
  const q = query(
    collection(db,"episodios"),
    where("serie","==",id),
    orderBy("ordem")
  );

  const snap = await getDocs(q);

  let html = `<h2 style="text-align:center;">Episódios</h2>`;

  snap.forEach(doc=>{
    const ep = doc.data();

    html += `
      <div class="ep">
        <img src="${ep.capa}">
        <div>
          <h3>${ep.nome}</h3>
          <button onclick="abrirEp('${doc.id}')">Assistir</button>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
};

/* PLAYER */
window.abrirEp = async (id) => {
  const snap = await getDoc(doc(db,"episodios",id));
  const ep = snap.data();

  document.getElementById("app").innerHTML = `
    <div class="player">
      <h2>${ep.nome}</h2>
      <iframe src="${ep.video.replace("watch?v=","embed/")}" allowfullscreen></iframe>
    </div>
  `;
};

/* ADM */
window.abrirADM = () => {
  document.getElementById("app").innerHTML = `
    <h2>ADM</h2>

    <input id="nomeSerie" placeholder="Nome da série">
    <input id="capaSerie" placeholder="Capa">
    <button onclick="addSerie()">Adicionar Série</button>

    <hr>

    <input id="nomeEp" placeholder="Nome do episódio">
    <input id="serieId" placeholder="ID da série">
    <input id="ordem" placeholder="Ordem">
    <input id="capaEp" placeholder="Capa episódio">
    <input id="video" placeholder="Link vídeo">
    <button onclick="addEp()">Adicionar Episódio</button>
  `;
};

window.addSerie = async () => {
  await addDoc(collection(db,"series"), {
    nome: nomeSerie.value,
    capa: capaSerie.value
  });
  alert("Série adicionada");
};

window.addEp = async () => {
  await addDoc(collection(db,"episodios"), {
    nome: nomeEp.value,
    serie: serieId.value,
    ordem: Number(ordem.value),
    capa: capaEp.value,
    video: video.value
  });
  alert("Episódio adicionado");
};

/* START */
home();

</script>

</body>
</html>
