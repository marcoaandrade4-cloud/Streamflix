<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Flix</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
.topo { background:#111; padding:15px; text-align:center; }
.banner { text-align:center; color:#00ff00; padding:10px; }

.card {
  background:#111;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

img { width:100%; border-radius:10px; }

button {
  background:#00ff00;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topo">
  <h1>Stream Flix</h1>
</div>

<div class="banner">
  <h2>Bem-vindo ao Stream Flix!</h2>
</div>

<div id="novo"></div>
<div id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  query, orderBy, where, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 DEBUG
function erro(msg) {
  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h3>⚠️ ${msg}</h3>
    </div>
  `;
}

// 🔥 NOVO EP
async function novo() {
  try {
    const q = query(collection(db,"episodios"), orderBy("ordem","desc"));
    const snap = await getDocs(q);

    if (snap.empty) return;

    const d = snap.docs[0];
    const ep = d.data();

    document.getElementById("novo").innerHTML = `
      <div class="card">
        <h3>Novo episódio</h3>
        <p>${ep.nome}</p>
        <button onclick="abrirEp('${d.id}')">Assistir</button>
      </div>
    `;
  } catch(e) {
    console.error(e);
  }
}

// 🔥 HOME
async function home() {
  try {
    const snap = await getDocs(collection(db,"series"));

    if (snap.empty) {
      erro("Nenhuma série encontrada no Firebase");
      return;
    }

    let html = "";

    snap.forEach(doc=>{
      const s = doc.data();

      html += `
        <div class="card" onclick="abrirSerie('${doc.id}')">
          <img src="${s.capa}">
          <h3>${s.nome}</h3>
        </div>
      `;
    });

    document.getElementById("conteudo").innerHTML = html;

  } catch(e) {
    erro("Erro ao conectar com Firebase");
    console.error(e);
  }
}

// 🔥 SÉRIE
async function serie(id) {
  const q = query(
    collection(db,"episodios"),
    where("serie","==",id),
    orderBy("ordem")
  );

  const snap = await getDocs(q);

  let html="";

  snap.forEach(doc=>{
    const ep = doc.data();

    html += `
      <div class="card">
        <img src="${ep.capa}">
        <h3>${ep.nome}</h3>
        <button onclick="abrirEp('${doc.id}')">Assistir</button>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 PLAYER
async function episodio(id) {
  const snap = await getDoc(doc(db,"episodios",id));
  const ep = snap.data();

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h2>${ep.nome}</h2>
      <iframe width="100%" height="300"
      src="${ep.video.replace("watch?v=", "embed/")}"
      allowfullscreen></iframe>
    </div>
  `;
}

// 🔥 NAV
window.abrirSerie = (id)=> location.search="?serie="+id;
window.abrirEp = (id)=> location.search="?ep="+id;

// 🔥 INIT
novo();

const params = new URLSearchParams(location.search);

if(params.get("ep")) episodio(params.get("ep"));
else if(params.get("serie")) serie(params.get("serie"));
else home();

</script>

</body>
</html>
