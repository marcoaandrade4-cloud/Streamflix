<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Flix</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{background:#0a0;padding:10px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;padding:10px;border-radius:10px}
.card img{width:100%;border-radius:10px}
button{background:#0f0;border:none;padding:8px;border-radius:8px}
.hidden{display:none}
</style>
</head>

<body>

<header>Stream Flix</header>

<div id="home">
  <div class="grid" id="grid"></div>
</div>

<div id="player" class="hidden">
  <button onclick="voltar()">Voltar</button>
  <h2 id="titulo"></h2>
  <video id="video" controls width="100%"></video>
</div>

<script>
let db = {
  series:[
    {
      nome:"1ª Temporada",
      img:"https://picsum.photos/300/400",
      eps:[
        {
          nome:"Episódio 1",
          video:"https://www.w3schools.com/html/mov_bbb.mp4"
        }
      ]
    }
  ]
};

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  db.series.forEach((s,i)=>{
    grid.innerHTML += `
      <div class="card" onclick="abrir(${i})">
        <img src="${s.img}">
        <p>${s.nome}</p>
      </div>
    `;
  });
}

function abrir(i){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("player").classList.remove("hidden");

  const ep = db.series[i].eps[0];
  document.getElementById("titulo").innerText = ep.nome;
  document.getElementById("video").src = ep.video;
}

function voltar(){
  location.reload();
}

render();
</script>

</body>
</html>
