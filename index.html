<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>StreamFlix</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    h1 {
      color: red;
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      justify-content: center;
    }

    .card {
      width: 150px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .player {
      display: none;
      text-align: center;
      padding: 20px;
    }

    input, textarea, select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>STREAMFLIX 🎬</h1>

<!-- CATÁLOGO -->
<div id="catalogo" class="grid"></div>

<!-- PLAYER -->
<div id="player" class="player"></div>

<hr>

<h2 style="text-align:center;">PAINEL ADM</h2>

<input id="title" placeholder="Título">
<input id="cover" placeholder="URL da capa">
<textarea id="desc" placeholder="Sinopse"></textarea>
<input id="video" placeholder="Link do vídeo">

<select id="type">
  <option value="youtube">YouTube</option>
  <option value="drive">Drive</option>
  <option value="mp4">MP4</option>
</select>

<button onclick="salvar()">Salvar</button>

<script>
  // 🔥 CONFIG FIREBASE (SEU)
  const firebaseConfig = {
    apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
    authDomain: "streamflix-62461.firebaseapp.com",
    projectId: "streamflix-62461"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🎬 SALVAR
  async function salvar() {
    const title = document.getElementById("title").value;
    const cover = document.getElementById("cover").value;
    const desc = document.getElementById("desc").value;
    const video = document.getElementById("video").value;
    const type = document.getElementById("type").value;

    await db.collection("movies").add({
      title,
      cover,
      description: desc,
      videoUrl: video,
      videoType: type
    });

    alert("Salvo!");
    carregar();
  }

  // 📺 CARREGAR CATÁLOGO
  async function carregar() {
    const div = document.getElementById("catalogo");
    div.innerHTML = "";

    const snap = await db.collection("movies").get();

    snap.forEach(doc => {
      const m = doc.data();

      div.innerHTML += `
        <div class="card" onclick="assistir('${m.videoUrl}','${m.videoType}')">
          <img src="${m.cover}">
          <p>${m.title}</p>
        </div>
      `;
    });
  }

  // ▶️ PLAYER
  function assistir(url, type) {
    const player = document.getElementById("player");
    player.style.display = "block";

    if (type === "mp4") {
      player.innerHTML = `<video controls width="80%"><source src="${url}"></video>`;
    }

    if (type === "youtube") {
      player.innerHTML = `<iframe width="80%" height="400" src="https://www.youtube.com/embed/${url}" allowfullscreen></iframe>`;
    }

    if (type === "drive") {
      player.innerHTML = `<iframe width="80%" height="400" src="${url}" allow="autoplay"></iframe>`;
    }

    window.scrollTo(0, 0);
  }

  carregar();
</script>

</body>
  </html>
