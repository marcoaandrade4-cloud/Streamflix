<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Flix</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
header { background:#111; padding:15px; text-align:center; }
.banner { text-align:center; color:#00ff00; padding:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
}

img { width:100%; border-radius:10px; }

button {
  background:#00ff00;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Stream Flix</h1>
</header>

<div class="banner">
  <h2>Bem-vindo ao Stream Flix!</h2>
</div>

<div id="novo"></div>
<div id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, where, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 DADOS FALLBACK (se Firebase falhar)
const fallback = {
  series: [
    {
      id: "1",
      nome: "Miraculous",
      capa: "https://i.imgur.com/2DhmtJ4.jpg"
    }
  ],
  episodios: [
    {
      id: "1",
      serie: "1",
      nome: "Ep 1 - Origem",
      ordem: 1,
      capa: "https://i.imgur.com/2DhmtJ4.jpg",
      video: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    }
  ]
};

// 🔥 ROTEAMENTO
const params = new URLSearchParams(window.location.search);
const serieId = params.get("serie");
const epId = params.get("ep");

// 🔥 PLAYER
function player(link) {
  if (link.includes("youtube")) {
    return `<iframe width="100%" height="300" src="${link.replace("watch?v=", "embed/")}" allowfullscreen></iframe>`;
  }
  if (link.includes("drive")) {
    return `<iframe width="100%" height="300" src="${link.replace("/view", "/preview")}" allowfullscreen></iframe>`;
  }
  return `<video src="${link}" controls width="100%"></video>`;
}

// 🔥 CARREGAR DADOS (Firebase ou fallback)
async function getSeries() {
  try {
    const snap = await getDocs(collection(db, "series"));
    if (snap.empty) throw "vazio";

    let arr = [];
    snap.forEach(doc => arr.push({ id: doc.id, ...doc.data() }));
    return arr;

  } catch {
    return fallback.series;
  }
}

async function getEpisodios() {
  try {
    const snap = await getDocs(query(collection(db, "episodios"), orderBy("ordem")));
    if (snap.empty) throw "vazio";

    let arr = [];
    snap.forEach(doc => arr.push({ id: doc.id, ...doc.data() }));
    return arr;

  } catch {
    return fallback.episodios;
  }
}

// 🔥 NOVO EP
async function novoEp() {
  const eps = await getEpisodios();
  const ultimo = eps[eps.length - 1];

  document.getElementById("novo").innerHTML = `
    <div class="card">
      <h2>Novo episódio!</h2>
      <p>${ultimo.nome}</p>
      <button onclick="abrirEp('${ultimo.id}')">Assistir</button>
    </div>
  `;
}

// 🔥 HOME
async function home() {
  const series = await getSeries();

  let html = '<div class="grid">';
  series.forEach(s => {
    html += `
      <div onclick="abrirSerie('${s.id}')">
        <img src="${s.capa}">
        <p>${s.nome}</p>
      </div>
    `;
  });

  html += "</div>";
  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 SÉRIE
async function serie(id) {
  const eps = await getEpisodios();

  let html = "";
  eps.filter(e => e.serie == id).forEach(ep => {
    html += `
      <div class="card">
        <img src="${ep.capa}">
        <h3>${ep.nome}</h3>
        <button onclick="abrirEp('${ep.id}')">Assistir</button>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 EPISÓDIO
async function episodio(id) {
  const eps = await getEpisodios();
  const ep = eps.find(e => e.id == id);

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h2>${ep.nome}</h2>
      ${player(ep.video)}
    </div>
  `;
}

// 🔥 NAVEGAÇÃO
window.abrirSerie = (id) => location.search = "?serie=" + id;
window.abrirEp = (id) => location.search = "?ep=" + id;

// 🔥 INIT
novoEp();

if (epId) episodio(epId);
else if (serieId) serie(serieId);
else home();

</script>

</body>
</html>
