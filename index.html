<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StreamFlix</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#000;
 color:#fff;
}

/* NAVBAR */
.nav{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 background:#0b0b0b;
 border-bottom:2px solid #00ff66;
}

.logo{
 color:#00ff66;
 font-weight:bold;
 font-size:18px;
}

.nav button{
 background:#00ff66;
 border:none;
 padding:8px 12px;
 border-radius:10px;
 font-weight:bold;
}

/* BANNER */
.banner{
 margin:15px;
 padding:20px;
 border-radius:15px;
 background:linear-gradient(135deg,#0f1f14,#001a0a);
 text-align:center;
 box-shadow:0 0 25px #00ff66;
}

.banner h2{
 margin:0;
}

.banner button{
 margin-top:10px;
 background:#00ff66;
 border:none;
 padding:12px 25px;
 border-radius:12px;
 font-weight:bold;
 font-size:16px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 position:relative;
 border-radius:15px;
 overflow:hidden;
 transition:.3s;
}

.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 15px #00ff66;
}

.card img{
 width:100%;
 height:100%;
 object-fit:cover;
}

.card span{
 position:absolute;
 bottom:0;
 width:100%;
 background:rgba(0,0,0,0.7);
 padding:5px;
 text-align:center;
}
</style>
</head>

<body>

<div class="nav">
 <div class="logo">🐾 StreamFlix</div>
 <button onclick="location.href='admin.html'">ADM</button>
</div>

<div class="banner">
 <h2>🔥 Novo episódio disponível!</h2>
 <button onclick="assistirNovo()">▶ Assistir agora</button>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 projectId:"streamflix-62461"
});
const db = getFirestore(app);

async function carregar(){
 const snap = await getDocs(collection(db,"conteudos"));

 snap.forEach(d=>{
  const c = d.data();

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <img src="${c.cover}">
   <span>${c.title}</span>
  `;

  div.onclick=()=>{
   localStorage.setItem("serie",JSON.stringify(c));
   location.href="serie.html";
  };

  grid.appendChild(div);
 });
}

async function assistirNovo(){
 const snap = await getDocs(collection(db,"conteudos"));
 let ultimo=null;
 snap.forEach(d=> ultimo=d.data());

 if(ultimo){
  localStorage.setItem("serie",JSON.stringify(ultimo));
  location.href="serie.html";
 }
}

carregar();
</script>

</body>
</html>
