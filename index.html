<script>
let db = JSON.parse(localStorage.getItem("db")) || { series: [] };

let serieAtual = null;
let epAtual = null;

/* ---------- RENDER ---------- */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  db.series.forEach((s,i)=>{
    grid.innerHTML += `
    <div class="card" onclick="abrirLista(${i})">
      <img src="${s.img}" onerror="this.src='https://via.placeholder.com/300x400'">
      <p>${s.nome}</p>
    </div>`;
  });
}

/* ---------- LISTA ---------- */
function abrirLista(i){
  serieAtual=i;
  esconderTudo();
  let lista=document.getElementById("lista");
  lista.classList.remove("hidden");

  lista.innerHTML = `
  <button onclick="voltar()">⬅</button>
  <h2>${db.series[i].nome}</h2>
  `;

  db.series[i].eps.forEach((ep,index)=>{
    lista.innerHTML += `
    <div class="ep">
      <img src="${db.series[i].img}">
      <div>
        <h4>${ep.nome}</h4>
        <button onclick="abrirPlayer(${i},${index})">▶</button>
        <button onclick="editarEp(${index})">✏️</button>
        <button onclick="removerEp(${index})">❌</button>
      </div>
    </div>`;
  });
}

/* ---------- PLAYER ---------- */
function abrirPlayer(s,e){
  esconderTudo();
  document.getElementById("player").classList.remove("hidden");

  let ep=db.series[s].eps[e];
  document.getElementById("titulo").innerText=ep.nome;

  let div=document.getElementById("idiomas");
  div.innerHTML="";
  ep.idiomas.forEach((i,index)=>{
    div.innerHTML += `
      <button onclick="trocar('${i.link}')">${i.nome}</button>
    `;
  });

  trocar(ep.idiomas[0].link);
}

function trocar(l){
  document.getElementById("video").src=l;
}

function voltar(){
  location.reload();
}

/* ---------- ADM ---------- */
function loginADM(){
  let s=prompt("Senha:");
  if(s==="1234"){
    abrirPainel();
  }
}

function abrirPainel(){
  esconderTudo();
  let lista=document.getElementById("lista");
  lista.classList.remove("hidden");

  lista.innerHTML = `
    <h2>Modo ADM</h2>

    <h3>Series</h3>
    ${db.series.map((s,i)=>`
      <div class="ep">
        <img src="${s.img}">
        <div>
          <b>${s.nome}</b><br>
          <button onclick="editarSerie(${i})">✏️</button>
          <button onclick="removerSerie(${i})">❌</button>
        </div>
      </div>
    `).join("")}

    <hr>

    <h3>Nova Série</h3>
    <input id="novaSerieNome" placeholder="Nome">
    <input id="novaSerieImg" placeholder="Imagem">
    <button onclick="criarSerie()">Criar</button>
  `;
}

/* ---------- SERIE ---------- */
function criarSerie(){
  db.series.push({
    nome:document.getElementById("novaSerieNome").value,
    img:document.getElementById("novaSerieImg").value,
    eps:[]
  });
  salvar();
  abrirPainel();
}

function editarSerie(i){
  let s = db.series[i];

  document.getElementById("lista").innerHTML = `
    <h2>Editar Série</h2>

    <input id="nomeSerie" value="${s.nome}">
    <input id="imgSerie" value="${s.img}">
    <button onclick="salvarSerie(${i})">Salvar</button>

    <h3>Episódios</h3>
    ${s.eps.map((ep,idx)=>`
      <div>
        ${ep.nome}
        <button onclick="editarEp(${idx},${i})">✏️</button>
      </div>
    `).join("")}

    <hr>

    <input id="novoEpNome" placeholder="Novo episódio">
    <button onclick="criarEp(${i})">Adicionar episódio</button>

    <br><br>
    <button onclick="abrirPainel()">⬅ Voltar</button>
  `;
}

function salvarSerie(i){
  db.series[i].nome = document.getElementById("nomeSerie").value;
  db.series[i].img = document.getElementById("imgSerie").value;
  salvar();
  abrirPainel();
}

function removerSerie(i){
  db.series.splice(i,1);
  salvar();
  abrirPainel();
}

/* ---------- EP ---------- */
function criarEp(i){
  db.series[i].eps.push({
    nome:document.getElementById("novoEpNome").value,
    idiomas:[]
  });
  salvar();
  editarSerie(i);
}

function editarEp(e,sIndex=serieAtual){
  let ep = db.series[sIndex].eps[e];

  document.getElementById("lista").innerHTML = `
    <h2>Editar Episódio</h2>

    <input id="nomeEp" value="${ep.nome}">
    <button onclick="salvarEp(${e},${sIndex})">Salvar</button>

    <h3>Idiomas</h3>
    ${ep.idiomas.map((i,idx)=>`
      <div>
        ${i.nome}
        <button onclick="removerIdioma(${e},${idx})">❌</button>
      </div>
    `).join("")}

    <input id="idiomaNome" placeholder="BR">
    <input id="idiomaLink" placeholder="link">
    <button onclick="addIdioma(${e},${sIndex})">Adicionar</button>

    <br><br>
    <button onclick="editarSerie(${sIndex})">⬅ Voltar</button>
  `;
}

function salvarEp(e,s){
  db.series[s].eps[e].nome = document.getElementById("nomeEp").value;
  salvar();
  editarSerie(s);
}

function removerEp(i){
  db.series[serieAtual].eps.splice(i,1);
  salvar();
  abrirLista(serieAtual);
}

/* ---------- IDIOMAS ---------- */
function addIdioma(e,s){
  db.series[s].eps[e].idiomas.push({
    nome:document.getElementById("idiomaNome").value,
    link:document.getElementById("idiomaLink").value
  });
  salvar();
  editarEp(e,s);
}

function removerIdioma(e,i){
  db.series[serieAtual].eps[e].idiomas.splice(i,1);
  salvar();
  editarEp(e,serieAtual);
}

/* ---------- UTIL ---------- */
function salvar(){
  localStorage.setItem("db", JSON.stringify(db));
}

function esconderTudo(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("lista").classList.add("hidden");
  document.getElementById("player").classList.add("hidden");
}

/* START */
render();
</script>
