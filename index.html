<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Noir Brasil</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{background:#00ff00;color:#000;padding:12px;display:flex;justify-content:space-between}
button{background:#00ff00;border:none;padding:6px;border-radius:6px;margin:3px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:220px;object-fit:cover}
.ep{display:flex;background:#111;margin:10px;border-radius:10px}
.ep img{width:120px;object-fit:cover}
.hidden{display:none}
input{width:100%;margin:5px 0;padding:6px}
iframe,video{width:100%;height:250px;border:none}
.banner{margin:10px;background:#111;padding:15px;border-radius:10px;text-align:center}
footer{background:linear-gradient(#000,#00ff00);text-align:center;padding:20px}
</style>
</head>

<body>

<header>
🐾 Chat Noir Brasil
<div>
<button onclick="home()">🏠</button>
<button onclick="adm()">⚙️</button>
</div>
</header>

<div class="banner">
<h3>Novo episódio!</h3>
<button onclick="player(0)">▶ Assistir</button>
</div>

<div id="home">
<h3 style="text-align:center">Temporadas</h3>
<div class="grid" id="grid"></div>
</div>

<div id="lista" class="hidden"></div>
<div id="player" class="hidden"></div>
<div id="admin" class="hidden"></div>

<footer>
<h2>Chat Noir Brasil</h2>
<p>Site de fãs</p>
</footer>

<script>
let db = JSON.parse(localStorage.getItem("db")) || {
  series:[
    {
      nome:"1ª Temporada",
      img:"https://picsum.photos/300/400",
      eps:[
        {
          nome:"Episódio 1",
          idiomas:[
            {nome:"BR",link:"https://www.youtube.com/watch?v=dQw4w9WgXcQ"}
          ]
        }
      ]
    }
  ]
};

let serieAtual=0;

/* HOME */
function render(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";
  db.series.forEach((s,i)=>{
    grid.innerHTML+=`
    <div class="card" onclick="lista(${i})">
      <img src="${s.img}" onerror="this.src='https://via.placeholder.com/300x400'">
      <p>${s.nome}</p>
    </div>`;
  });
}

/* LISTA */
function lista(i){
  serieAtual=i;
  esconder();
  let div=document.getElementById("lista");
  div.classList.remove("hidden");

  div.innerHTML=`<button onclick="home()">⬅</button><h2>${db.series[i].nome}</h2>`;

  db.series[i].eps.forEach((ep,index)=>{
    div.innerHTML+=`
    <div class="ep">
      <img src="${db.series[i].img}">
      <div>
        <h4>${ep.nome}</h4>
        <button onclick="player(${index})">▶</button>
        ${localStorage.getItem("adm") ? `<button onclick="editEp(${index})">✏️</button>` : ""}
        ${localStorage.getItem("adm") ? `<button onclick="delEp(${index})">❌</button>` : ""}
      </div>
    </div>`;
  });
}

/* PLAYER */
function player(e){
  esconder();
  let ep=db.series[serieAtual].eps[e];
  let div=document.getElementById("player");
  div.classList.remove("hidden");

  div.innerHTML=`
  <button onclick="lista(${serieAtual})">⬅</button>
  <h2>${ep.nome}</h2>
  <div id="idiomas"></div>
  <div id="videoBox"></div>`;

  let idiomas=document.getElementById("idiomas");

  ep.idiomas.forEach(i=>{
    idiomas.innerHTML+=`<button onclick="trocar('${i.link}')">${i.nome}</button>`;
  });

  trocar(ep.idiomas[0]?.link);
}

/* PLAYER ENGINE */
function trocar(link){
  let box=document.getElementById("videoBox");

  if(!link){
    box.innerHTML="Sem vídeo";
    return;
  }

  // YouTube
  if(link.includes("youtube.com") || link.includes("youtu.be")){
    let id = link.split("v=")[1] || link.split("/").pop();
    box.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
    return;
  }

  // Drive
  if(link.includes("drive.google.com")){
    let id = link.split("/d/")[1]?.split("/")[0];
    box.innerHTML=`<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
    return;
  }

  // MP4
  box.innerHTML=`<video controls><source src="${link}"></video>`;
}

/* ADM LOGIN */
function adm(){
  let s=prompt("Senha ADM:");
  if(s!=="1234") return alert("Negado");

  localStorage.setItem("adm","on");
  abrirADM();
}

function sairADM(){
  localStorage.removeItem("adm");
  home();
}

/* PAINEL */
function abrirADM(){
  esconder();
  let div=document.getElementById("admin");
  div.classList.remove("hidden");

  div.innerHTML=`
  <h2>ADM</h2>
  <button onclick="sairADM()">Sair</button>

  <h3>Séries</h3>
  ${db.series.map((s,i)=>`
    <div>
      ${s.nome}
      <button onclick="editSerie(${i})">✏️</button>
      <button onclick="delSerie(${i})">❌</button>
    </div>
  `).join("")}

  <hr>

  <input id="sNome" placeholder="Nome série">
  <input id="sImg" placeholder="Imagem">
  <button onclick="addSerie()">Criar</button>

  <br><br>
  <button onclick="home()">⬅</button>
  `;
}

/* SERIE */
function addSerie(){
  db.series.push({nome:sNome.value,img:sImg.value,eps:[]});
  save(); abrirADM();
}

function editSerie(i){
  let s=db.series[i];

  let div=document.getElementById("admin");
  div.innerHTML=`
  <h2>Editar Série</h2>

  <input id="n" value="${s.nome}">
  <input id="img" value="${s.img}">
  <button onclick="saveSerie(${i})">Salvar</button>

  <h3>Episódios</h3>
  ${s.eps.map((e,idx)=>`
    <div>
      ${e.nome}
      <button onclick="editEp(${idx})">✏️</button>
    </div>
  `).join("")}

  <input id="novoEp" placeholder="Novo episódio">
  <button onclick="addEp(${i})">Adicionar</button>

  <br><br>
  <button onclick="abrirADM()">⬅</button>
  `;
}

function saveSerie(i){
  db.series[i].nome=n.value;
  db.series[i].img=img.value;
  save(); abrirADM();
}

function delSerie(i){
  db.series.splice(i,1);
  save(); abrirADM();
}

/* EP */
function addEp(i){
  db.series[i].eps.push({nome:novoEp.value,idiomas:[]});
  save(); editSerie(i);
}

function editEp(e){
  let ep=db.series[serieAtual].eps[e];

  let div=document.getElementById("admin");
  div.innerHTML=`
  <h2>Editar Episódio</h2>

  <input id="nome" value="${ep.nome}">
  <button onclick="saveEp(${e})">Salvar</button>

  <h3>Idiomas</h3>
  ${ep.idiomas.map((i,idx)=>`
    <div>
      ${i.nome}
      <button onclick="delIdioma(${e},${idx})">❌</button>
    </div>
  `).join("")}

  <input id="iNome" placeholder="Idioma">
  <input id="iLink" placeholder="Link">
  <button onclick="addIdioma(${e})">Adicionar</button>

  <br><br>
  <button onclick="abrirADM()">⬅</button>
  `;
}

function saveEp(e){
  db.series[serieAtual].eps[e].nome=nome.value;
  save(); abrirADM();
}

function delEp(i){
  db.series[serieAtual].eps.splice(i,1);
  save(); lista(serieAtual);
}

/* IDIOMA */
function addIdioma(e){
  db.series[serieAtual].eps[e].idiomas.push({
    nome:iNome.value,
    link:iLink.value
  });
  save(); editEp(e);
}

function delIdioma(e,i){
  db.series[serieAtual].eps[e].idiomas.splice(i,1);
  save(); editEp(e);
}

/* UTIL */
function save(){
  localStorage.setItem("db",JSON.stringify(db));
}

function esconder(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("lista").classList.add("hidden");
  document.getElementById("player").classList.add("hidden");
  document.getElementById("admin").classList.add("hidden");
}

function home(){
  location.reload();
}

render();
</script>

</body>
</html>
