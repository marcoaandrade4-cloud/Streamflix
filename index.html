  getFirestore, collection, getDocs, addDoc,
  query, where, orderBy, doc, getDoc, updateDoc

/* FIREBASE */

  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* =========================
   HOME (NÃO ALTERA DESIGN)
========================= */
window.home = async () => {
  const snap = await getDocs(collection(db,"series"));

  let html = document.getElementById("app").innerHTML; // mantém layout atual

  let lista = "";

  snap.forEach(docSnap=>{
    const s = docSnap.data();

    lista += `
      <div class="card" onclick="abrirSerie('${docSnap.id}')">
        <img src="${s.capa}">
        <h3>${s.nome}</h3>
      </div>
    `;
  });

  document.getElementById("seriesGrid").innerHTML = lista;
};

/* =========================
   ABRIR SÉRIE → TEMPORADAS
========================= */
window.abrirSerie = async (serieId) => {

  const snap = await getDocs(
    query(collection(db,"episodios"), where("serie","==",serieId))
  );

  let temporadas = {};

  snap.forEach(docSnap=>{
    const ep = docSnap.data();
    const temp = ep.temporada || 1;

    if(!temporadas[temp]) temporadas[temp] = [];
    temporadas[temp].push({id:docSnap.id, ...ep});
  });

  let html = `<h2 style="text-align:center;">Temporadas</h2>`;

  Object.keys(temporadas).sort((a,b)=>a-b).forEach(t=>{
    html += `
      <div class="card" onclick="abrirTemporada('${serieId}', ${t})">
        <h3>${t}ª Temporada</h3>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
};

/* =========================
   ABRIR TEMPORADA → EPISÓDIOS
========================= */
window.abrirTemporada = async (serieId, temp) => {

  const snap = await getDocs(
    query(
      collection(db,"episodios"),
      where("serie","==",serieId),
      where("temporada","==",temp),
      orderBy("ordem")
    )
  );

  let html = `<h2 style="text-align:center;">${temp}ª Temporada</h2>`;

  snap.forEach(docSnap=>{
    const ep = docSnap.data();

    html += `
      <div class="ep">
        <img src="${ep.capa}">
        <div>
          <h3>${ep.nome}</h3>
          <p>${ep.sinopse || ""}</p>
          <small>${ep.ano || ""}</small><br>
          <button onclick="abrirEp('${docSnap.id}')">Assistir</button>
          <button onclick="editarEp('${docSnap.id}')">✏️</button>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
};

/* =========================
   PLAYER
========================= */
window.abrirEp = async (id) => {
  const snap = await getDoc(doc(db,"episodios",id));
  const ep = snap.data();

  let video = ep.video;

  // suporte youtube
  if(video.includes("youtube.com/watch")){
    video = video.replace("watch?v=","embed/");
  }

  // suporte drive
  if(video.includes("drive.google.com")){
    video = video.replace("/view","/preview");
  }

  document.getElementById("app").innerHTML = `
    <h2>${ep.nome}</h2>

    <iframe src="${video}" width="100%" height="250" allowfullscreen></iframe>

    <p>${ep.sinopse || ""}</p>
    <small>${ep.ano || ""}</small>
  `;
};

/* =========================
   ADM EDITAR EP
========================= */
window.editarEp = async (id) => {
  const snap = await getDoc(doc(db,"episodios",id));
  const ep = snap.data();

  document.getElementById("app").innerHTML = `
    <h2>Editar Episódio</h2>

    <input id="nome" value="${ep.nome}">
    <input id="capa" value="${ep.capa}">
    <input id="video" value="${ep.video}">
    <input id="ano" value="${ep.ano || ""}">
    <input id="sinopse" value="${ep.sinopse || ""}">

    <button onclick="salvarEdit('${id}')">Salvar</button>
  `;
};

window.salvarEdit = async (id) => {
  await updateDoc(doc(db,"episodios",id), {
    nome: nome.value,
    capa: capa.value,
    video: video.value,
    ano: ano.value,
    sinopse: sinopse.value
  });

  alert("Atualizado com sucesso!");
};

/* =========================
   ADM CRIAR (mantido)
========================= */
window.addEp = async () => {

/* START */
home();

</script>
