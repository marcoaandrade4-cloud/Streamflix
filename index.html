<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Flix</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* TOPO */
.topo {
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topo h1 {
  margin:0;
}

/* MENU */
.menu {
  display:flex;
  gap:15px;
}

.menu div {
  cursor:pointer;
}

/* BANNER */
.banner {
  text-align:center;
  color:#00ff00;
  padding:10px;
}

/* CARD GRANDE */
.card {
  background:#111;
  margin:15px;
  border-radius:12px;
  overflow:hidden;
}

.card img {
  width:100%;
}

.card-content {
  padding:10px;
}

button {
  background:#00ff00;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <h1>Stream Flix</h1>

  <div class="menu">
    <div onclick="home()">🏠</div>
    <div>📃</div>
    <div>👥</div>
    <div>+</div>
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <h2>Bem-vindo ao Stream Flix!</h2>
</div>

<!-- NOVO EP -->
<div id="novo"></div>

<!-- CONTEÚDO -->
<div id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs,
  query, orderBy, where, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ROUTER
const params = new URLSearchParams(location.search);
const serieId = params.get("serie");
const epId = params.get("ep");

// PLAYER
function player(link) {
  if (link.includes("youtube"))
    return `<iframe src="${link.replace("watch?v=", "embed/")}" width="100%" height="300"></iframe>`;

  if (link.includes("drive"))
    return `<iframe src="${link.replace("/view", "/preview")}" width="100%" height="300"></iframe>`;

  return `<video src="${link}" controls width="100%"></video>`;
}

// NOVO EP
async function novo() {
  const q = query(collection(db,"episodios"), orderBy("ordem","desc"));
  const snap = await getDocs(q);

  if (snap.empty) return;

  const d = snap.docs[0];
  const ep = d.data();

  document.getElementById("novo").innerHTML = `
    <div class="card">
      <img src="${ep.capa}">
      <div class="card-content">
        <h3>Novo episódio!</h3>
        <p>${ep.nome}</p>
        <button onclick="abrirEp('${d.id}')">Assistir</button>
      </div>
    </div>
  `;
}

// HOME (TEMPORADAS)
async function home() {
  const snap = await getDocs(collection(db,"series"));

  let html = "";

  snap.forEach(doc=>{
    const s = doc.data();

    html += `
      <div class="card" onclick="abrirSerie('${doc.id}')">
        <img src="${s.capa}">
        <div class="card-content">
          <h3>${s.nome}</h3>
        </div>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// LISTA DE EP
async function serie(id) {
  const q = query(
    collection(db,"episodios"),
    where("serie","==",id),
    orderBy("ordem")
  );

  const snap = await getDocs(q);

  let html="";

  snap.forEach(doc=>{
    const ep = doc.data();

    html += `
      <div class="card">
        <img src="${ep.capa}">
        <div class="card-content">
          <h3>${ep.nome}</h3>
          <button onclick="abrirEp('${doc.id}')">Assistir</button>
        </div>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// PLAYER
async function episodio(id) {
  const snap = await getDoc(doc(db,"episodios",id));
  const ep = snap.data();

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <div class="card-content">
        <h2>${ep.nome}</h2>
        ${player(ep.video)}
      </div>
    </div>
  `;
}

// NAVEGAÇÃO
window.abrirSerie = (id)=> location.search="?serie="+id;
window.abrirEp = (id)=> location.search="?ep="+id;

// INIT
novo();

if(epId) episodio(epId);
else if(serieId) serie(serieId);
else home();

</script>

</body>
</html>
