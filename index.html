<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>StreamFlix</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    h1 {
      text-align: center;
      color: red;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 10px;
    }

    .card {
      width: 150px;
      cursor: pointer;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    #player {
      text-align: center;
      margin: 20px;
    }
  </style>
</head>

<body>

<h1>STREAMFLIX 🎬</h1>

<div id="player"></div>
<div id="catalogo" class="grid"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
    authDomain: "streamflix-62461.firebaseapp.com",
    projectId: "streamflix-62461"
  });

  const db = getFirestore(app);

  const catalogo = document.getElementById("catalogo");
  const player = document.getElementById("player");

  async function carregar() {
    const snap = await getDocs(collection(db, "movies"));

    snap.forEach(doc => {
      const m = doc.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${m.cover}">
        <p>${m.title}</p>
      `;

      div.onclick = () => assistir(m.videoUrl, m.videoType);

      catalogo.appendChild(div);
    });
  }

  function assistir(url, type) {
    if (type === "youtube") {
      player.innerHTML = `<iframe width="80%" height="400" src="https://www.youtube.com/embed/${url}" allowfullscreen></iframe>`;
    }

    if (type === "mp4") {
      player.innerHTML = `<video controls width="80%"><source src="${url}"></video>`;
    }

    if (type === "drive") {
      player.innerHTML = `<iframe width="80%" height="400" src="${url}" allow="autoplay"></iframe>`;
    }

    window.scrollTo(0, 0);
  }

  carregar();
</script>

</body>
</html>
