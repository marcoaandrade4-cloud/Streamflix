<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Flix</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }

header {
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

button {
  background:#00ff00;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.card {
  background:#111;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

input {
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>

<body>

<header>
  <h1>Stream Flix</h1>
  <button onclick="abrirADM()">+</button>
</header>

<div id="conteudo"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc,
  query, orderBy, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 HOME
async function home() {
  const snap = await getDocs(collection(db,"series"));

  let html = "";

  snap.forEach(doc=>{
    const s = doc.data();

    html += `
      <div class="card">
        <img src="${s.capa}" width="100%">
        <h3>${s.nome}</h3>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 ADM
window.abrirADM = () => {
  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h2>Adicionar Série</h2>
      <input id="nomeSerie" placeholder="Nome">
      <input id="capaSerie" placeholder="URL da capa">
      <button onclick="addSerie()">Salvar</button>

      <h2>Adicionar Episódio</h2>
      <input id="nomeEp" placeholder="Nome">
      <input id="serieId" placeholder="ID da série">
      <input id="ordem" placeholder="Ordem">
      <input id="capaEp" placeholder="Capa">
      <input id="video" placeholder="Link vídeo">
      <button onclick="addEp()">Salvar</button>
    </div>
  `;
};

// 🔥 ADD SÉRIE
window.addSerie = async () => {
  await addDoc(collection(db,"series"), {
    nome: nomeSerie.value,
    capa: capaSerie.value
  });

  alert("Série adicionada!");
  home();
};

// 🔥 ADD EP
window.addEp = async () => {
  await addDoc(collection(db,"episodios"), {
    nome: nomeEp.value,
    serie: serieId.value,
    ordem: Number(ordem.value),
    capa: capaEp.value,
    video: video.value
  });

  alert("Episódio adicionado!");
};

// INIT
home();

</script>

</body>
</html>
