<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Stream Flix</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

header {
  background: #111;
  padding: 15px;
  text-align: center;
}

.banner {
  text-align: center;
  color: #00ff00;
  padding: 15px;
}

.card {
  background: #111;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

button {
  background: #00ff00;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Stream Flix</h1>
</header>

<div class="banner">
  <h2>Bem-vindo ao Stream Flix!</h2>
</div>

<div id="novo"></div>

<div id="conteudo"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc, where } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 SUA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
  authDomain: "streamflix-62461.firebaseapp.com",
  projectId: "streamflix-62461",
  storageBucket: "streamflix-62461.firebasestorage.app",
  messagingSenderId: "894473429433",
  appId: "1:894473429433:web:51a0215903fbb277305668"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 ROTEAMENTO SIMPLES
const params = new URLSearchParams(window.location.search);
const serieId = params.get("serie");
const epId = params.get("ep");

// 🔥 PLAYER
function player(link) {
  if (link.includes("youtube")) {
    return `<iframe width="100%" height="300" src="${link.replace("watch?v=", "embed/")}" allowfullscreen></iframe>`;
  }
  if (link.includes("drive")) {
    return `<iframe width="100%" height="300" src="${link.replace("/view", "/preview")}" allowfullscreen></iframe>`;
  }
  return `<video src="${link}" controls width="100%"></video>`;
}

// 🔥 NOVO EPISÓDIO (NUNCA SOME)
async function novoEp() {
  const q = query(collection(db, "episodios"), orderBy("ordem"));
  const snap = await getDocs(q);

  let ultimo;
  snap.forEach(doc => ultimo = doc);

  if (ultimo) {
    const ep = ultimo.data();

    document.getElementById("novo").innerHTML = `
      <div class="card">
        <h2>Novo episódio!</h2>
        <p>${ep.nome}</p>
        <button onclick="abrirEp('${ultimo.id}')">Assistir</button>
      </div>
    `;
  }
}

// 🔥 HOME
async function home() {
  const snap = await getDocs(collection(db, "series"));
  let html = '<div class="grid">';

  snap.forEach(doc => {
    const s = doc.data();
    html += `
      <div onclick="abrirSerie('${doc.id}')">
        <img src="${s.capa}">
        <p>${s.nome}</p>
      </div>
    `;
  });

  html += "</div>";
  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 SÉRIE
async function serie(id) {
  const q = query(
    collection(db, "episodios"),
    where("serie", "==", id),
    orderBy("ordem")
  );

  const snap = await getDocs(q);
  let html = "";

  snap.forEach(doc => {
    const ep = doc.data();

    html += `
      <div class="card">
        <img src="${ep.capa}">
        <h3>${ep.nome}</h3>
        <button onclick="abrirEp('${doc.id}')">Assistir</button>
      </div>
    `;
  });

  document.getElementById("conteudo").innerHTML = html;
}

// 🔥 PLAYER PAGE
async function episodio(id) {
  const docSnap = await getDoc(doc(db, "episodios", id));
  const ep = docSnap.data();

  document.getElementById("conteudo").innerHTML = `
    <div class="card">
      <h2>${ep.nome}</h2>
      ${player(ep.video)}
    </div>
  `;
}

// 🔥 NAVEGAÇÃO
window.abrirSerie = (id) => {
  window.location.search = "?serie=" + id;
};

window.abrirEp = (id) => {
  window.location.search = "?ep=" + id;
};

// 🔥 INICIAR
novoEp();

if (epId) {
  episodio(epId);
} else if (serieId) {
  serie(serieId);
} else {
  home();
}

</script>

</body>
</html>
