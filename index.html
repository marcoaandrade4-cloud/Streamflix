<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>STREAMFLIX</title>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
header{display:flex;justify-content:space-between;padding:10px;background:#111}
h1{color:red}
.grid{display:flex;flex-wrap:wrap;gap:15px;padding:15px}
.card{width:150px;cursor:pointer}
.card img{width:100%;border-radius:10px}
button{background:#0f0;border:none;padding:10px;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<header>
<h1>STREAMFLIX</h1>
<button onclick="abrirADM()">ADM</button>
</header>

<div class="grid" id="catalogo"></div>

<script>
let catalogo = JSON.parse(localStorage.getItem("catalogo")) || [];

function render(){
  let div = document.getElementById("catalogo");
  div.innerHTML="";

  catalogo.forEach((item,i)=>{
    div.innerHTML += `
      <div class="card" onclick="abrir(${i})">
        <img src="${item.capa}">
        <p>${item.titulo}</p>
      </div>
    `;
  });
}

function abrir(i){
  window.location.href="serie.html?id="+i;
}

function abrirADM(){
  let senha = prompt("Senha:");
  if(senha==="1234"){
    window.location.href="adm.html";
  }else{
    alert("Senha errada");
  }
}

render();
</script>

</body>
</html>
