<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>STREAMFLIX</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  margin:0;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.card{
  width:140px;
  cursor:pointer;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#0f0;
  border:none;
  padding:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <h2>STREAMFLIX</h2>
  <button onclick="abrirADM()">ADM</button>
</header>

<div class="grid" id="catalogo"></div>

<script>
let catalogo = JSON.parse(localStorage.getItem("catalogo")) || [];

/* MOSTRAR CATÁLOGO */
function carregar(){
  let div = document.getElementById("catalogo");
  div.innerHTML = "";

  catalogo.forEach((item,i)=>{
    div.innerHTML += `
      <div class="card" onclick="abrirSerie(${i})">
        <img src="${item.capa}">
        <p>${item.titulo}</p>
      </div>
    `;
  });
}

/* ABRIR SÉRIE */
function abrirSerie(i){
  window.location.href = "serie.html?id=" + i;
}

/* ADM COM SENHA */
function abrirADM(){
  let senha = prompt("Senha:");

  if(senha === "1234"){
    window.location.href = "adm.html";
  } else {
    alert("Senha errada");
  }
}

carregar();
</script>

</body>
</html>
