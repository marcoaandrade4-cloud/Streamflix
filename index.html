<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StreamFlix</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

/* NAV */
.nav{
 display:flex;justify-content:space-between;
 padding:12px;background:#0b0b0b;
 border-bottom:2px solid #00ff66;
}
.logo{color:#00ff66;font-weight:bold}
.nav button{
 background:#00ff66;border:none;
 padding:8px 12px;border-radius:10px;
 font-weight:bold;
}

/* BANNER */
.banner{
 margin:15px;
 padding:25px;
 border-radius:20px;
 background:linear-gradient(135deg,#00ff66,#003d1f);
 box-shadow:0 0 30px #00ff66;
 text-align:center;
}
.banner h2{margin:0}
.banner button{
 margin-top:15px;
 background:#00ff66;
 color:#000;
 border:none;
 padding:15px 35px;
 border-radius:20px;
 font-size:18px;
 font-weight:bold;
 box-shadow:0 0 20px #00ff66;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 padding:15px;
}
.card{
 border-radius:15px;
 overflow:hidden;
 position:relative;
 transition:.3s;
}
.card:hover{
 transform:scale(1.07);
 box-shadow:0 0 15px #00ff66;
}
.card img{width:100%}
.card span{
 position:absolute;bottom:0;width:100%;
 background:rgba(0,0,0,0.7);
 text-align:center;
 padding:5px;
}
</style>
</head>

<body>

<div class="nav">
 <div class="logo">🐾 CNBR Stream</div>
 <button onclick="location.href='admin.html'">ADM</button>
</div>

<div class="banner">
 <h2>🔥 Novo episódio disponível!</h2>
 <button onclick="assistirNovo()">▶ Assistir agora</button>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 projectId:"streamflix-62461"
});
const db = getFirestore(app);

async function carregar(){
 const snap = await getDocs(collection(db,"conteudos"));
 snap.forEach(d=>{
  const c=d.data();

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <img src="${c.cover}">
   <span>${c.title}</span>
  `;

  div.onclick=()=>{
   localStorage.setItem("serie",JSON.stringify(c));
   location.href="serie.html";
  };

  grid.appendChild(div);
 });
}

async function assistirNovo(){
 const snap = await getDocs(collection(db,"conteudos"));
 let ultimo=null;
 snap.forEach(d=> ultimo=d.data());

 if(ultimo){
  localStorage.setItem("serie",JSON.stringify(ultimo));
  location.href="serie.html";
 }
}

carregar();
</script>

</body>
</html>
