<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StreamFlix</title>

<style>
body {
  background:#0b0f0b;
  color:white;
  font-family:Arial;
  margin:0;
}

/* TOPO */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
}

.logo {
  color:#00ff66;
  font-weight:bold;
  font-size:20px;
}

.search {
  padding:8px;
  border-radius:5px;
  border:none;
}

/* BANNER */
.banner {
  background:#111;
  margin:10px;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.banner button {
  background:#00ff66;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
}

.card p {
  text-align:center;
  padding:5px;
}

/* PLAYER */
#player {
  text-align:center;
  margin:20px;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">🐾 StreamFlix</div>
  <input class="search" placeholder="Pesquisar...">
</div>

<div class="banner">
  <h2>Novo episódio!</h2>
  <p>Assista agora</p>
  <button onclick="scrollToConteudo()">Assistir</button>
</div>

<div id="player"></div>

<h2 style="padding-left:10px;">Temporadas</h2>
<div id="catalogo" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyBkpOKakidlZ2WVZNBI9oEFHEjs1EqCt78",
 authDomain:"streamflix-62461.firebaseapp.com",
 projectId:"streamflix-62461"
});

const db = getFirestore(app);

const catalogo = document.getElementById("catalogo");
const player = document.getElementById("player");

function scrollToConteudo(){
 window.scrollTo({top:300, behavior:"smooth"});
}

async function carregar(){
 const snap = await getDocs(collection(db,"conteudos"));

 if(snap.empty){
   catalogo.innerHTML="<p>Nenhum conteúdo ainda...</p>";
   return;
 }

 snap.forEach(doc=>{
  const c = doc.data();

  const div = document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${c.cover}">
    <p>${c.title}</p>
  `;

  div.onclick=()=>abrir(c);

  catalogo.appendChild(div);
 });
}

function abrir(c){
 if(c.type==="filme"){
  escolherIdioma(c.languages);
 } else {
  // série
  player.innerHTML="<h2>Temporadas</h2>";

  c.seasons.forEach((s,i)=>{
    player.innerHTML+=`<button onclick='temp(${i})'>Temporada ${i+1}</button>`;
  });

  window.temp = (i)=>{
    mostrarEp(c.seasons[i]);
  };
 }
}

function mostrarEp(season){
 player.innerHTML="<h2>Episódios</h2>";

 season.episodes.forEach(ep=>{
  player.innerHTML+=`<button onclick='ep(${JSON.stringify(ep)})'>${ep.title}</button>`;
 });

 window.ep = (ep)=>{
  escolherIdioma(ep.languages);
 };
}

function escolherIdioma(langs){
 player.innerHTML="<h2>Idioma</h2>";

 langs.forEach(l=>{
  player.innerHTML+=`<button onclick='play("${l.url}","${l.type}")'>${l.lang}</button>`;
 });

 window.play = (url,type)=>{
  if(type==="youtube"){
    player.innerHTML=`<iframe width="90%" height="400" src="https://www.youtube.com/embed/${url}"></iframe>`;
  }
 };
}

carregar();
</script>

</body>
</html>
